<svg width="100%" height="70" viewBox="0 0 900 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* 1. Definição Base (Fallback Seguro) */
      .text { 
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 14px; 
        opacity: .9; 
        font-weight: 500;
        letter-spacing: 0.5px;
        fill: #4c4f69; /* Cor escura (Latte Text) por padrão - segurança para fundos brancos */
      }
      
      .dot { fill: #8839ef; } /* Mauve mais escuro para contraste no branco */

      /* 2. Detecção de Dark Mode (A Mágica) */
      @media (prefers-color-scheme: dark) {
        .text { fill: #cdd6f4 !important; } /* Cor clara (Mocha Text) */
        .dot { fill: #cba6f7 !important; }  /* Mauve claro */
      }
    </style>
  </defs>

  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" class="text">
    built with care <tspan class="dot"> • </tspan> catppuccin powered
  </text>
</svg>
