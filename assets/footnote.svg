<svg width="100%" height="44" viewBox="0 0 520 44" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Styled with the Catppuccin palette">
  <defs>
    <!-- sombra suave -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.6" flood-color="#11111b" flood-opacity="0.7"/>
    </filter>

    <!-- gradiente bem sutil no pill -->
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
  </defs>

  <!-- pill -->
  <rect x="8" y="6" width="504" height="32" rx="10" ry="10"
        fill="url(#pillGrad)" filter="url(#softShadow)"/>
  <rect x="8" y="6" width="504" height="32" rx="10" ry="10"
        fill="none" stroke="#313244" stroke-width="1.4"/>

  <!-- mini strip catppuccin à esquerda -->
  <g transform="translate(22,16)">
    <rect width="7" height="12" rx="3" fill="#f5e0dc"/>
    <rect x="8"  width="7" height="12" rx="3" fill="#f2cdcd"/>
    <rect x="16" width="7" height="12" rx="3" fill="#f5c2e7"/>
    <rect x="24" width="7" height="12" rx="3" fill="#cba6f7"/>
    <rect x="32" width="7" height="12" rx="3" fill="#89b4fa"/>
  </g>

  <!-- texto -->
  <text x="50%" y="22" text-anchor="middle" dominant-baseline="middle"
        font-family="JetBrains Mono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="15.5" font-weight="600" fill="#cdd6f4" letter-spacing="0.2">
    Styled with the Catppuccin palette 🎨
  </text>
</svg>
