<svg width="100%" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="João Pedro N.">
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#11111b" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- subtle pill backdrop -->
  <rect x="90" y="42" width="720" height="78" rx="18" ry="18" fill="#1e1e2e" opacity="0.9" filter="url(#shadow)"/>
  <rect x="90" y="42" width="720" height="78" rx="18" ry="18" fill="none" stroke="#313244" stroke-width="2"/>

  <!-- mocha rainbow strip -->
  <rect x="140.00" y="18" width="56.36" height="10" rx="5" ry="5" fill="#f5e0dc"/><rect x="196.36" y="18" width="56.36" height="10" fill="#f2cdcd"/><rect x="252.73" y="18" width="56.36" height="10" fill="#f5c2e7"/><rect x="309.09" y="18" width="56.36" height="10" fill="#cba6f7"/><rect x="365.45" y="18" width="56.36" height="10" fill="#b4befe"/><rect x="421.82" y="18" width="56.36" height="10" fill="#89b4fa"/><rect x="478.18" y="18" width="56.36" height="10" fill="#89dceb"/><rect x="534.55" y="18" width="56.36" height="10" fill="#94e2d5"/><rect x="590.91" y="18" width="56.36" height="10" fill="#a6e3a1"/><rect x="647.27" y="18" width="56.36" height="10" fill="#f9e2af"/><rect x="703.64" y="18" width="56.36" height="10" rx="5" ry="5" fill="#fab387"/>

  <!-- title -->
  <text x="50%" y="85" text-anchor="middle" dominant-baseline="middle"
        font-family="JetBrains Mono, 'Fira Code', Consolas, monospace"
        font-size="54" font-weight="800" letter-spacing="1.2"
        filter="url(#softGlow)">
    <tspan fill="#f5e0dc">J</tspan><tspan fill="#f2cdcd">o</tspan><tspan fill="#f5c2e7">ã</tspan><tspan fill="#cba6f7">o</tspan><tspan xml:space="preserve"> </tspan><tspan fill="#b4befe">P</tspan><tspan fill="#89b4fa">e</tspan><tspan fill="#89dceb">d</tspan><tspan fill="#94e2d5">r</tspan><tspan fill="#a6e3a1">o</tspan><tspan xml:space="preserve"> </tspan><tspan fill="#f9e2af">N</tspan><tspan fill="#fab387">.</tspan>
  </text>

  <!-- tiny catppuccin dots (decor) -->
  <circle cx="120" cy="81" r="3.5" fill="#cba6f7"/>
  <circle cx="130" cy="81" r="3.5" fill="#89b4fa"/>
  <circle cx="140" cy="81" r="3.5" fill="#94e2d5"/>
</svg>
